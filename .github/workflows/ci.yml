name: dbt CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dbt-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install -r requirements.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: dbt deps
        run: dbt deps --profiles-dir .
        env:
          DBT_BQ_PROJECT: ${{ vars.DBT_BQ_PROJECT }}

      - name: dbt compile
        run: dbt compile --profiles-dir .
        env:
          DBT_BQ_PROJECT: ${{ vars.DBT_BQ_PROJECT }}

      - name: dbt seed (reference data only)
        run: dbt seed --profiles-dir .
        env:
          DBT_BQ_PROJECT: ${{ vars.DBT_BQ_PROJECT }}

      - name: dbt test (sources + staging)
        run: dbt test --select staging --profiles-dir .
        env:
          DBT_BQ_PROJECT: ${{ vars.DBT_BQ_PROJECT }}
