version: 2

sources:
  - name: raw
    database: "{{ env_var('DBT_BQ_PROJECT') }}"
    schema: raw
    description: >
      Stack Overflow Developer Survey 2025 loaded into BigQuery.
      ~49k global respondents; European data professionals are the target population.
    tables:
      - name: so_survey
        description: >
          Stack Overflow Developer Survey 2025. One row per respondent.
          ~53k global respondents. ConvertedCompYearly is annual compensation
          converted to USD by Stack Overflow.
        config:
          loaded_at_field: _bq_loaded_at
          freshness:
            warn_after: {count: 400, period: day}
            error_after: {count: 800, period: day}
        columns:
          - name: ResponseId
            description: Unique survey response identifier.
            tests:
              - unique
              - not_null
          - name: Country
            description: Full country name of the respondent. Nullable — many survey respondents skip this field. Null rows are dropped downstream via inner join on european_countries.
            tests:
              - not_null:
                  config:
                    severity: warn
          - name: ConvertedCompYearly
            description: Annual total compensation converted to USD by Stack Overflow.
          - name: DevType
            description: Semicolon-separated list of developer role types.
          - name: _bq_loaded_at
            description: Timestamp added at BigQuery load time.

      - name: profesia_listings
        description: >
          IT job listings scraped from profesia.sk. One row per scrape event per listing.
          Appended on each scraper run — _scraped_at is the incremental watermark.
          contact_name contains real recruiter names and is treated as PII.
        config:
          loaded_at_field: _scraped_at
          freshness:
            warn_after: {count: 3, period: day}
            error_after: {count: 7, period: day}
        columns:
          - name: offer_id
            description: Profesia.sk numeric listing identifier.
            tests:
              - not_null
          - name: contact_name
            description: Recruiter full name as shown on the listing. PII — hashed in staging.
          - name: _scraped_at
            description: Timestamp when the row was scraped and loaded.
