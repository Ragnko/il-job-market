version: 2

models:
  - name: stg_survey_responses
    description: >
      Cleaned and renamed salary records. Rows with no compensation data
      or implausible salary values (< $10k or > $500k USD/year) are excluded.
      All respondents are retained here regardless of country or role — the
      European and data-role filter is applied downstream in intermediate models.
    columns:
      - name: response_id
        description: Surrogate key derived from all non-null source columns.
        tests:
          - unique
          - not_null
      - name: country_code
        description: ISO 3166-1 alpha-2 code for the employee's country of residence.
        tests:
          - not_null
      - name: comp_yearly_usd
        description: Annual compensation in USD.
        tests:
          - not_null
      - name: job_title_raw
        description: Raw job title from source.
        tests:
          - not_null
      - name: experience_level_code
        description: EN / MI / SE / EX seniority code from source.
        tests:
          - not_null
          - accepted_values:
              values: [EN, MI, SE, EX]
