version: 2

models:
  - name: stg_so_survey
    description: >
      Cleaned Stack Overflow Developer Survey 2025 responses. Filters out records
      with no compensation data or implausible salary values (< $10k or > $500k USD/year).
      Country names are normalised to match the european_countries seed.
      Seniority is derived from WorkExp (years of professional experience).
      EU and data-role filtering is applied downstream in intermediate models.
    columns:
      - name: response_id
        description: Surrogate key derived from ResponseId.
        tests:
          - unique
          - not_null
      - name: country_name
        description: Full country name, normalised to match european_countries seed.
        tests:
          - not_null
      - name: comp_yearly_usd
        description: Annual compensation in USD (ConvertedCompYearly from source).
        tests:
          - not_null
      - name: job_title_raw
        description: Raw DevType field (semicolon-separated multi-select).
        tests:
          - not_null
      - name: experience_level_code
        description: EN / MI / SE / EX derived from WorkExp (years of professional experience).
